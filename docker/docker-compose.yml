services:
  slurm:
    build: .
    image: prefect-submitit-slurm:dev
    hostname: slurm-node
    volumes:
      - ..:/workspace
      - pixi-env:/workspace/.pixi  # separate from host's macOS .pixi/
    environment:
      SLURM_TEST_PARTITION: debug
      PREFECT_API_URL: http://localhost:4200/api  # must match --port below
    ports:
      - "4200:4200"
    tty: true
    stdin_open: true

volumes:
  pixi-env:
