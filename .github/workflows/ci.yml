name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.39.5
          environments: dev

      - name: Lint
        run: pixi run -e dev fmt

      - name: Check for lint changes
        run: git diff --exit-code

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.39.5
          environments: dev

      - name: Run tests
        run: pixi run -e dev test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.39.5
          environments: dev

      - name: Build distribution
        run: pixi run -e dev build-dist

      - name: Check distribution
        run: pixi run -e dev check-dist
